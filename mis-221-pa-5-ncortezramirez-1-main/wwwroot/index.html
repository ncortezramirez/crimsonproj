<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crimson Sports Complex</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="app">
    <header class="nav-header">
      <h1>Crimson Sports Complex</h1>
      <nav class="nav-links">
        <a href="/index.html" class="active">Home</a>
        <a href="/manager.html">Manager</a>
        <a href="/athlete.html">Athlete</a>
        <a href="/reports.html">Reports</a>
        <span id="userInfo" style="color: var(--text-muted);"></span>
        <a href="/login.html" id="logoutLink">Logout</a>
      </nav>
    </header>

    <h2 class="page-title">Dashboard</h2>
    <p class="page-subtitle">Select an area to get started</p>

    <div class="card-grid">
      <a href="/manager.html" class="card" style="text-decoration: none; color: inherit;">
        <h3 style="color: var(--crimson); margin-bottom: 0.5rem;">Manager</h3>
        <ul style="list-style: none; color: var(--text-muted); font-size: 0.9rem;">
          <li>Add / Remove / Edit Sessions</li>
          <li>Mark complete</li>
        </ul>
      </a>
      <a href="/athlete.html" class="card" style="text-decoration: none; color: inherit;">
        <h3 style="color: var(--crimson); margin-bottom: 0.5rem;">Athlete</h3>
        <ul style="list-style: none; color: var(--text-muted); font-size: 0.9rem;">
          <li>View available sessions</li>
          <li>Register for sessions</li>
          <li>My history</li>
        </ul>
      </a>
      <a href="/reports.html" class="card" style="text-decoration: none; color: inherit;">
        <h3 style="color: var(--crimson); margin-bottom: 0.5rem;">Reports</h3>
        <ul style="list-style: none; color: var(--text-muted); font-size: 0.9rem;">
          <li>Daily sessions</li>
          <li>Date range report</li>
        </ul>
      </a>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    const user = requireAuth();
    if (user) {
      document.getElementById('userInfo').textContent = `${user.name} (${user.role})`;
    }
  </script>
</body>
</html>
