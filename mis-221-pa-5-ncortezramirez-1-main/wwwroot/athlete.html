<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Athlete - Crimson Sports Complex</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="app">
    <header class="nav-header">
      <h1>Crimson Sports Complex</h1>
      <nav class="nav-links">
        <a href="/index.html">Home</a>
        <a href="/manager.html">Manager</a>
        <a href="/athlete.html" class="active">Athlete</a>
        <a href="/reports.html">Reports</a>
        <a href="/login.html">Logout</a>
      </nav>
    </header>

    <h2 class="page-title">Athlete</h2>
    <p class="page-subtitle">View sessions, register, or check your history</p>

    <div id="msg" class="msg" style="display: none;"></div>

    <div style="margin-bottom: 1.5rem; display: flex; gap: 0.5rem; flex-wrap: wrap;">
      <button class="btn" onclick="viewAvailableSessions()">View Sessions</button>
      <button class="btn btn-secondary" onclick="showRegisterForm()">Register</button>
      <button class="btn btn-secondary" onclick="viewMyHistory()">My History</button>
    </div>

    <div id="content">
      <p style="color: var(--text-muted);">Select an action above.</p>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    requireAuth();

    let currentReg = null;

    function msg(txt, type = 'success') {
      const el = document.getElementById('msg');
      el.textContent = txt;
      el.className = 'msg ' + type;
      el.style.display = 'block';
      setTimeout(() => { el.style.display = 'none'; }, 4000);
    }

    async function viewAvailableSessions() {
      try {
        const sessions = await apiCall('/sessions');
        const list = (sessions || []).filter(s => s && s.seatsLeft > 0);
        let html = '<h3 style="margin-bottom: 0.5rem;">Available Sessions</h3><div class="table-wrap"><table><tr><th>ID</th><th>Sport</th><th>Coach</th><th>Duration</th><th>Price</th><th>Seats</th></tr>';
        list.forEach(s => {
          html += `<tr><td>${s.id}</td><td>${s.sport}</td><td>${s.coach}</td><td>${s.duration} min</td><td>$${s.price}</td><td>${s.seatsLeft}</td></tr>`;
        });
        html += '</table></div>';
        document.getElementById('content').innerHTML = html;
      } catch {
        msg('Failed to load sessions.', 'error');
      }
    }

    async function showRegisterForm() {
      try {
        const sessions = await apiCall('/sessions');
        const list = (sessions || []).filter(s => s && s.seatsLeft > 0);
        const user = getSession();
        let opts = list.map(s => `<option value="${s.id}" data-price="${s.price}">${s.sport} - ${s.coach} ($${s.price})</option>`).join('');
        document.getElementById('content').innerHTML = `
          <div class="card" style="max-width: 400px;">
            <h3 style="margin-bottom: 1rem;">Register for Session</h3>
            <div class="form-group">
              <label>Session</label>
              <select id="sessionSelect">${opts}</select>
            </div>
            <div class="form-group">
              <label>Email</label>
              <input type="email" id="athleteEmail" value="${user?.email || ''}">
            </div>
            <div class="form-group">
              <label>Name</label>
              <input type="text" id="athleteName" value="${user?.name || ''}">
            </div>
            <button class="btn" onclick="startPayment()">Continue</button>
            <button class="btn btn-secondary" onclick="showAthleteMenu()">Back</button>
          </div>
        `;
      } catch {
        msg('Failed to load sessions.', 'error');
      }
    }

    function startPayment() {
      const email = document.getElementById('athleteEmail').value;
      const name = document.getElementById('athleteName').value;
      const sel = document.getElementById('sessionSelect');
      if (!email || !name) { msg('Fill all fields.', 'error'); return; }

      currentReg = {
        sessionId: parseInt(sel.value),
        email,
        name,
        price: parseFloat(sel.options[sel.selectedIndex].dataset.price)
      };

      document.getElementById('content').innerHTML = `
        <div class="card" style="max-width: 500px;">
          <h3 style="margin-bottom: 1rem;">Play Crimson 2048 for 10% off</h3>
          <p style="color: var(--text-muted); margin-bottom: 1rem;">Reach 100 points for a discount.</p>
          <div style="margin-bottom: 1rem; font-size: 1.2rem;">Score: <span id="gameScore">0</span> / 100</div>
          <div class="game-board" id="gameBoard" style="display: grid; grid-template-columns: repeat(4, 60px); gap: 6px; margin-bottom: 1rem;"></div>
          <button class="btn" onclick="skipGame()">Skip</button>
          <button class="btn btn-secondary" onclick="initGame()">Start</button>
        </div>
      `;
    }

    let gameBoard = [], gameScore = 0, gameActive = false;

    function initGame() {
      gameBoard = Array(16).fill(0);
      gameScore = 0;
      gameActive = true;
      addTile();
      addTile();
      render();
      document.addEventListener('keydown', onKey);
    }

    function addTile() {
      const empty = gameBoard.map((v, i) => v === 0 ? i : -1).filter(i => i >= 0);
      if (empty.length) gameBoard[empty[Math.floor(Math.random() * empty.length)]] = Math.random() < 0.9 ? 2 : 4;
    }

    function render() {
      const board = document.getElementById('gameBoard');
      if (!board) return;
      board.innerHTML = gameBoard.map((v, i) => `<div style="width:60px;height:60px;background:var(--surface-hover);border:1px solid var(--border);border-radius:4px;display:flex;align-items:center;justify-content:center;font-weight:bold;" data-value="${v}">${v || ''}</div>`).join('');
      const scoreEl = document.getElementById('gameScore');
      if (scoreEl) scoreEl.textContent = gameScore;
      if (gameScore >= 100 && gameActive) {
        gameActive = false;
        document.removeEventListener('keydown', onKey);
        setTimeout(() => completeReg(true), 300);
      }
    }

    function onKey(e) {
      if (!gameActive) return;
      if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) {
        e.preventDefault();
        gameScore += Math.floor(Math.random() * 20) + 5;
        addTile();
        render();
      }
    }

    function skipGame() {
      gameActive = false;
      document.removeEventListener('keydown', onKey);
      completeReg(false);
    }

    async function completeReg(discount) {
      try {
        const result = await apiCall('/registrations', 'POST', {
          email: currentReg.email,
          name: currentReg.name,
          sessionId: currentReg.sessionId,
          discountApplied: discount
        });
        const finalPrice = discount ? currentReg.price * 0.9 : currentReg.price;
        document.getElementById('content').innerHTML = `
          <div class="msg success">
            <strong>Registration complete</strong><br>
            ${result?.sportName || 'Session'} — $${finalPrice.toFixed(2)} ${discount ? '(10% off)' : ''}<br>
            Confirmation: ${result?.email || currentReg.email}
          </div>
        `;
      } catch {
        msg('Registration failed.', 'error');
      }
    }

    async function viewMyHistory() {
      const user = getSession();
      const email = prompt('Email:', user?.email || '');
      if (!email) return;
      try {
        const regs = await apiCall('/registrations/athlete/' + encodeURIComponent(email));
        const list = (regs || []).filter(Boolean);
        let html = '<h3 style="margin-bottom: 0.5rem;">History</h3><div class="table-wrap"><table><tr><th>Date</th><th>Sport</th><th>Status</th></tr>';
        list.forEach(r => { html += `<tr><td>${r.date}</td><td>${r.sportName}</td><td>${r.status}</td></tr>`; });
        html += '</table></div>';
        document.getElementById('content').innerHTML = html;
      } catch {
        msg('Failed to load history.', 'error');
      }
    }

    function showAthleteMenu() {
      document.getElementById('content').innerHTML = '<p style="color: var(--text-muted);">Select an action above.</p>';
    }
  </script>
</body>
</html>
