<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reports - Crimson Sports Complex</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="app">
    <header class="nav-header">
      <h1>Crimson Sports Complex</h1>
      <nav class="nav-links">
        <a href="/index.html">Home</a>
        <a href="/manager.html">Manager</a>
        <a href="/athlete.html">Athlete</a>
        <a href="/reports.html" class="active">Reports</a>
        <a href="/login.html">Logout</a>
      </nav>
    </header>

    <h2 class="page-title">Reports</h2>
    <p class="page-subtitle">Daily sessions or date range</p>

    <div id="msg" class="msg" style="display: none;"></div>

    <div style="margin-bottom: 1.5rem; display: flex; gap: 0.5rem; flex-wrap: wrap;">
      <button class="btn" onclick="showDailyReport()">Daily Sessions</button>
      <button class="btn btn-secondary" onclick="showDateRangeReport()">Date Range</button>
    </div>

    <div id="content">
      <p style="color: var(--text-muted);">Select a report above.</p>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    requireAuth();

    function msg(txt, type = 'success') {
      const el = document.getElementById('msg');
      el.textContent = txt;
      el.className = 'msg ' + type;
      el.style.display = 'block';
      setTimeout(() => { el.style.display = 'none'; }, 4000);
    }

    async function showDailyReport() {
      try {
        const report = await apiCall('/registrations/reports/daily');
        const list = (report || []).filter(Boolean);
        let html = '<h3 style="margin-bottom: 0.5rem;">Daily Sessions</h3><div class="table-wrap"><table><tr><th>Date</th><th>Registrations</th></tr>';
        list.forEach(r => { html += `<tr><td>${r.date}</td><td>${r.count}</td></tr>`; });
        html += '</table></div>';
        document.getElementById('content').innerHTML = html;
      } catch {
        msg('Failed to load report.', 'error');
      }
    }

    async function showDateRangeReport() {
      const start = prompt('Start date (MM/DD/YYYY):');
      const end = prompt('End date (MM/DD/YYYY):');
      if (!start || !end) return;
      try {
        const report = await apiCall(`/registrations/reports/daterange?startDate=${encodeURIComponent(start)}&endDate=${encodeURIComponent(end)}`);
        const list = (report || []).filter(Boolean);
        let html = '<h3 style="margin-bottom: 0.5rem;">Date Range Report</h3><div class="table-wrap"><table><tr><th>ID</th><th>Athlete</th><th>Email</th><th>Sport</th><th>Date</th></tr>';
        list.forEach(r => { html += `<tr><td>${r.id}</td><td>${r.name}</td><td>${r.email}</td><td>${r.sportName}</td><td>${r.date}</td></tr>`; });
        html += '</table></div>';
        document.getElementById('content').innerHTML = html;
      } catch {
        msg('Failed to load report.', 'error');
      }
    }
  </script>
</body>
</html>
