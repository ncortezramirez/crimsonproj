<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Crimson Sports Complex</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="app">
    <div style="max-width: 400px; margin: 4rem auto;">
      <h1 class="page-title" style="text-align: center; margin-bottom: 0.25rem;">Crimson Sports Complex</h1>
      <p class="page-subtitle" style="text-align: center; margin-bottom: 2rem;">Sign in to continue</p>

      <div id="msg" class="msg" style="display: none;"></div>

      <div class="card">
        <form id="loginForm">
          <div class="form-group">
            <label>Role</label>
            <select id="role" required>
              <option value="">Select role</option>
              <option value="manager">Manager</option>
              <option value="athlete">Athlete</option>
            </select>
          </div>
          <div class="form-group">
            <label>Name</label>
            <input type="text" id="name" placeholder="Your name" required>
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="you@example.com" required>
          </div>
          <button type="submit" class="btn" style="width: 100%; margin-top: 0.5rem;">Sign In</button>
        </form>
      </div>

      <p style="text-align: center; color: var(--text-muted); font-size: 0.85rem; margin-top: 1.5rem;">
        Demo: No password required. Role determines access.
      </p>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    if (getSession()) {
      window.location.href = '/index.html';
    }

    document.getElementById('loginForm').onsubmit = (e) => {
      e.preventDefault();
      const role = document.getElementById('role').value;
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      if (!role || !name || !email) return;

      setSession({ role, name, email });
      window.location.href = '/index.html';
    };
  </script>
</body>
</html>
